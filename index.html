<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NOC HydroSentinel v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#020617] text-slate-300 font-mono min-h-screen flex flex-col items-center justify-center">
    
    <div class="bg-slate-900 border border-slate-800 p-10 rounded-3xl shadow-2xl text-center w-full max-w-md">
        <h1 class="text-blue-500 font-bold tracking-tighter uppercase mb-8">NOC Terminal - Nivel Real</h1>
        
        <div class="relative w-24 h-64 bg-slate-950 mx-auto rounded-xl border-4 border-slate-800 overflow-hidden mb-8">
            <div id="waterFill" class="absolute bottom-0 w-full bg-blue-500 transition-all duration-1000" style="height: 0%"></div>
        </div>

        <div class="text-8xl font-black text-white tracking-tighter mb-2">
            <span id="mainNivel">--</span>
        </div>
        <p class="text-slate-500 font-bold uppercase text-xs tracking-widest">Centímetros</p>
    </div>

    <script>
        const FIREBASE_AUTH = "dnDjcywHxynS29VxdBLPDMo6nF5UC14QShKq4dmc";
        const URL = `https://hydrosentinel-b7ad6-default-rtdb.firebaseio.com/nodos/estacion_01/actual.json?auth=${FIREBASE_AUTH}`;

        async function sync() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                if (data) {
                    const nivel = data.nivel || 0;
                    document.getElementById('mainNivel').innerText = nivel;
                    // Porcentaje basado en fondo de 130cm
                    let porcentaje = (nivel / 130) * 100;
                    document.getElementById('waterFill').style.height = Math.min(porcentaje, 100) + "%";
                }
            } catch (e) { console.error("Error de enlace"); }
        }

        setInterval(sync, 3000);
        sync();
    </script>
</body>
</html>
