<script>
        // ====================================================================
        // [NÚCLEO JS BLINDADO MODULARMENTE - INTERFAZ INTACTA]
        // ====================================================================
        
        const CONFIG_NODOS = {
            "estacion_01": {
                nombre: "Canal Principal",
                camara_ip: "http://192.168.1.50:81/stream", 
                l: 1.0, h: 1.80, alerta: 1.60, critico: 1.80
            },
            "estacion_02": {
                nombre: "Desarenador Secundario",
                camara_ip: "http://192.168.1.51:81/stream",
                l: 1.5, h: 2.00, alerta: 1.50, critico: 1.80
            },
            "estacion_03": {
                nombre: "Compuerta Sur",
                camara_ip: "http://192.168.1.52:81/stream",
                l: 2.0, h: 1.80, alerta: 1.40, critico: 1.60
            }
        };

        const AUTH_TOKEN = "dnDjcywHxynS29VxdBLPDMo6nF5UC14QShKq4dmc";
        const FIREBASE_BASE = "https://hydrosentinel-b7ad6-default-rtdb.firebaseio.com/nodos/"; 
        
        let nodoActivo = Object.keys(CONFIG_NODOS)[0]; 
        let anchoL, sensorPosM, nivelAlertaM, nivelCriticoM;
        let fullDataset = []; 
        let lastDataTime = null;

        function getFirebaseTimestamp(id) {
            if (!id || id.length < 8 || !id.startsWith('-')) return Date.now();
            const PUSH_CHARS = '-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefghijklmnopqrstuvwxyz';
            let time = 0;
            for (let i = 0; i < 8; i++) {
                time = time * 64 + PUSH_CHARS.indexOf(id.charAt(i));
            }
            return time;
        }

        function downloadEvidence() {
            const img = document.getElementById('evidenceImage');
            if (img.src && !img.src.includes('window.location.href')) {
                const link = document.createElement('a');
                link.href = img.src;
                link.download = `Evidencia_${nodoActivo}_${new Date().getTime()}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        window.verDetalleDia = function(timestamp) {
            const fecha = new Date(timestamp);
            const dateStr = fecha.toISOString().split('T')[0];
            document.getElementById('histPeriod').value = "custom";
            document.getElementById('customDateRange').classList.remove('hidden');
            document.getElementById('dateStart').value = dateStr;
            document.getElementById('dateEnd').value = dateStr;
            document.getElementById('btnApplyFilter').click();
            document.getElementById('seccionGrafica').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const selectNodo = document.getElementById('nodoSelector');
            for (const [id, data] of Object.entries(CONFIG_NODOS)) {
                let option = document.createElement('option');
                option.value = id;
                option.text = `${data.nombre} (${id})`;
                option.className = "bg-slate-900 text-slate-200 font-bold";
                selectNodo.appendChild(option);
            }

            const ctxHist = document.getElementById('advancedHistoricalChart')?.getContext('2d');
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
            
            let advancedChart = new Chart(ctxHist, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Nivel Promedio', data: [], borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', borderWidth: 2, pointBackgroundColor: '#0284c7', pointBorderColor: '#38bdf8', pointRadius: 2, fill: true, tension: 0.4 }] },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { min: 0, beginAtZero: true, grid: { color: 'rgba(51, 65, 85, 0.5)' }, ticks: { font: { size: 10 } } }, x: { grid: { color: 'rgba(51, 65, 85, 0.3)' }, ticks: { font: { size: 10 }, maxRotation: 0 } } },
                    plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', titleColor: '#e2e8f0', bodyColor: '#cbd5e1', borderColor: '#334155', borderWidth: 1 } },
                    interaction: { mode: 'index', intersect: false }
                }
            });

            async function cargarConfiguracionNodo() {
                const cfg = CONFIG_NODOS[nodoActivo];
                try {
                    const resCfg = await fetch(`${FIREBASE_BASE}${nodoActivo}/calibracion.json?auth=${AUTH_TOKEN}`);
                    const dataCfg = await resCfg.json();
                    if(dataCfg) {
                        cfg.l = parseFloat(dataCfg.l) || cfg.l;
                        cfg.h = parseFloat(dataCfg.h) || cfg.h;
                        cfg.alerta = parseFloat(dataCfg.alerta) || cfg.alerta;
                        cfg.critico = parseFloat(dataCfg.critico) || cfg.critico;
                    }
                } catch(e) { console.log("Cargando calibración por defecto."); }

                document.getElementById('inputAnchoL').value = cfg.l;
                document.getElementById('inputSensorPos').value = cfg.h;
                document.getElementById('inputAlerta').value = cfg.alerta;
                document.getElementById('inputCritico').value = cfg.critico;
                document.getElementById('lblNodoEstado').innerText = cfg.nombre;
                document.getElementById('lblVideoNodo').innerText = cfg.nombre;
                document.getElementById('lblTablaNodo').innerText = cfg.nombre;

                const imgFeed = document.getElementById('ipCameraFeed');
                imgFeed.src = cfg.camara_ip;
                imgFeed.classList.remove('hidden');
                document.getElementById('videoPlaceholder').classList.add('hidden');
                fullDataset = [];
                updateOfflineUI("CARGANDO NODO", "Sincronizando con satélite...");
            }

            async function sync() {
                // 0. Leemos valores de configuración (H, L, Alertas)
                anchoL = parseFloat(document.getElementById('inputAnchoL').value) || 1.0;
                sensorPosM = parseFloat(document.getElementById('inputSensorPos').value) || 1.80;
                nivelAlertaM = parseFloat(document.getElementById('inputAlerta').value) || 1.60;
                nivelCriticoM = parseFloat(document.getElementById('inputCritico').value) || 1.80;

                let conexionActiva = false;

                // 1. BLOQUE BLINDADO: LECTURA EN TIEMPO REAL (Tanque Digital)
                try {
                    const resActual = await fetch(`${FIREBASE_BASE}${nodoActivo}/actual.json?auth=${AUTH_TOKEN}&nocache=${new Date().getTime()}`);
                    if (resActual.ok) {
                        const dataActual = await resActual.json();
                        if (dataActual) {
                            let nivelDato = typeof dataActual === 'object' ? dataActual.nivel : dataActual;
                            updateRealtimeUI(nivelDato);
                            conexionActiva = true;
                        }
                    }
                } catch (e) {
                    console.error("Fallo lectura en vivo");
                }

                // 2. BLOQUE BLINDADO: LECTURA HISTÓRICA (Gráficas)
                try {
                    // CÓDIGO CORREGIDO: %22%24key%22 es exactamente "$key" para Firebase
                    const resHist = await fetch(`${FIREBASE_BASE}${nodoActivo}/historial.json?auth=${AUTH_TOKEN}&orderBy=%22%24key%22&limitToLast=1000&nocache=${new Date().getTime()}`);
                    if (resHist.ok) {
                        const dataHist = await resHist.json();
                        if (dataHist && typeof dataHist === 'object' && Object.keys(dataHist).length > 0) {
                            fullDataset = Object.entries(dataHist).map(([id, val]) => ({
                                id,
                                nivel: parseFloat(val.nivel) || 0,
                                timestamp: val.timestamp || getFirebaseTimestamp(id)
                            })).sort((a,b) => a.timestamp - b.timestamp);

                            const last = fullDataset[fullDataset.length - 1];
                            lastDataTime = last.timestamp; 
                            renderData(); 
                            conexionActiva = true;
                        }
                    }
                } catch (e) {
                    console.error("Fallo lectura histórica");
                }

                // 3. BLOQUE BLINDADO: EVIDENCIA (ESP32-CAM)
                try {
                    const evRes = await fetch(`${FIREBASE_BASE}${nodoActivo}/evidencia.json?auth=${AUTH_TOKEN}&nocache=${new Date().getTime()}`);
                    if (evRes.ok) {
                        const evData = await evRes.json();
                        if(evData && evData.last_photo) {
                            const img = document.getElementById('evidenceImage');
                            img.src = "data:image/jpeg;base64," + evData.last_photo;
                            img.classList.remove('hidden');
                            document.getElementById('evidencePlaceholder').classList.add('hidden');
                            document.getElementById('evidenceData').classList.remove('hidden');
                            document.getElementById('evidenceDate').innerText = new Date().toLocaleString();
                            document.getElementById('btnDownloadEvidence').disabled = false;
                        }
                    }
                } catch (e) {
                    console.error("Fallo lectura cámara");
                }

                // Actualizar estado general de red
                if (conexionActiva) {
                    document.getElementById('connectionStatus').innerText = "ENLACE NOC ACTIVO";
                    document.getElementById('statusDot').className = "w-2 h-2 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_rgba(52,211,153,0.8)]";
                    document.getElementById('syncProgress').className = "bg-blue-500 h-full w-full animate-pulse";
                } else {
                    updateOfflineUI("ESPERANDO DATOS", "Verificando enlace físico...");
                }
            }

            function updateRealtimeUI(nivelCm) {
                const valNivel = isNaN(nivelCm) ? 0 : parseFloat(nivelCm);
                const nivelM = valNivel / 100.0;
                
                document.getElementById('currentLevel').innerText = valNivel;
                document.getElementById('currentLevel').className = "text-5xl font-black text-blue-400 transition-colors drop-shadow-[0_0_15px_rgba(96,165,250,0.4)]";
                document.getElementById('lastSync').innerText = lastDataTime ? new Date(lastDataTime).toLocaleTimeString() : new Date().toLocaleTimeString();
                
                let q = (nivelM <= 0) ? 0 : 1.45 * anchoL * Math.pow(nivelM, 1.5);
                document.getElementById('currentFlow').innerText = q.toFixed(3);
                document.getElementById('currentFlow').className = "text-5xl font-black text-cyan-400 transition-colors drop-shadow-[0_0_15px_rgba(34,211,238,0.4)]";
                
                const water = document.getElementById('waterLevel');
                const stTitle = document.getElementById('systemStatus');
                const stIcon = document.getElementById('statusIcon');
                const stDesc = document.getElementById('statusDesc');
                
                // CANDADO GRÁFICO: Evita que el tanque visual exceda los bordes
                let porcentajeLlenado = (nivelM / sensorPosM) * 100;
                porcentajeLlenado = Math.min(100, Math.max(0, porcentajeLlenado));
                
                water.style.height = `${porcentajeLlenado}%`;
                
                let topCritico = (1 - (nivelCriticoM / sensorPosM)) * 100;
                let topAlerta = (1 - (nivelAlertaM / sensorPosM)) * 100;
                document.getElementById('markerCritico').style.top = `${Math.max(0, topCritico)}%`;
                document.getElementById('markerAlerta').style.top = `${Math.max(0, topAlerta)}%`;
                
                document.getElementById('lblCritico').innerText = `${nivelCriticoM.toFixed(2)}m (C)`;
                document.getElementById('lblAlerta').innerText = `${nivelAlertaM.toFixed(2)}m (A)`;
                document.getElementById('displayParamsL').innerText = `L: ${anchoL.toFixed(1)}m`;
                document.getElementById('displayParamsH').innerText = `H: ${sensorPosM.toFixed(1)}m`;

                if (valNivel <= 0) {
                    water.className = "absolute bottom-0 left-0 w-full bg-slate-800/50 water-fill border-t border-slate-700 border-dashed";
                    stTitle.innerText = "ESPERANDO FLUJO";
                    stDesc.innerText = "Canal en nivel cero (0 cm)";
                    stIcon.className = "p-3 bg-slate-500/20 border border-slate-500/40 rounded-xl text-slate-400";
                    stIcon.innerHTML = '<i data-lucide="droplets"></i>';
                } else if (nivelM >= nivelCriticoM) {
                    water.className = "absolute bottom-0 left-0 w-full bg-red-600/90 water-fill shadow-[0_-5px_25px_rgba(220,38,38,0.6)]";
                    stTitle.innerText = "PELIGRO CRÍTICO";
                    stDesc.innerText = "Desbordamiento inminente en nodo";
                    stIcon.className = "p-3 bg-red-500/20 border border-red-500/40 rounded-xl text-red-400 animate-pulse";
                    stIcon.innerHTML = '<i data-lucide="alert-triangle"></i>';
                } else if (nivelM >= nivelAlertaM) {
                    water.className = "absolute bottom-0 left-0 w-full bg-yellow-500/90 water-fill shadow-[0_-5px_25px_rgba(234,179,8,0.4)]";
                    stTitle.innerText = "ALERTA OPERATIVA";
                    stDesc.innerText = "Nivel en observación técnica";
                    stIcon.className = "p-3 bg-yellow-500/20 border border-yellow-500/40 rounded-xl text-yellow-400";
                    stIcon.innerHTML = '<i data-lucide="alert-circle"></i>';
                } else {
                    water.className = "absolute bottom-0 left-0 w-full bg-blue-500/80 water-fill shadow-[0_-5px_25px_rgba(59,130,246,0.3)]";
                    stTitle.innerText = "ESTADO ESTABLE";
                    stDesc.innerText = "Condiciones de flujo normal";
                    stIcon.className = "p-3 bg-emerald-500/20 border border-emerald-500/40 rounded-xl text-emerald-400";
                    stIcon.innerHTML = '<i data-lucide="check-circle"></i>';
                }
                lucide.createIcons();
            }

            function updateOfflineUI(titulo, desc) {
                document.getElementById('systemStatus').innerText = titulo;
                document.getElementById('statusDesc').innerText = desc;
                document.getElementById('statusIcon').innerHTML = '<i data-lucide="satellite" class="w-8 h-8 animate-pulse"></i>';
                document.getElementById('currentLevel').innerText = "--";
                document.getElementById('currentFlow
