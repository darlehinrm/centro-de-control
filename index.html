<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroSentinel - Centro de Control NOC v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .water-fill { transition: height 1.5s ease-in-out, background-color 0.5s ease; }
        .crt-scanline {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 font-mono min-h-screen selection:bg-blue-500/30 overflow-x-hidden">
    <div class="fixed inset-0 crt-scanline z-50 opacity-20"></div>

    <nav class="border-b border-blue-500/20 bg-[#020617]/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                    <i data-lucide="droplets" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <span class="text-white font-black tracking-tighter text-lg uppercase">HydroSentinel</span>
                    <span class="text-blue-500 text-[10px] block leading-none font-bold">NOC TERMINAL v4.0</span>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="hidden md:flex flex-col items-end">
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-[0.2em]">Sincronización Estelar</span>
                    <span class="text-xs text-emerald-400 font-bold" id="statusTime">ONLINE // 0.00s</span>
                </div>
                <div class="h-8 w-[1px] bg-slate-800"></div>
                <select id="nodoSelector" class="bg-slate-900 border border-slate-700 text-xs rounded px-3 py-1.5 focus:outline-none focus:border-blue-500 transition-colors cursor-pointer">
                    <option value="estacion_01">NODO_LAN_01 (Ppal)</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-slate-900/50 border border-slate-800 rounded-xl p-6 relative group overflow-hidden">
                    <div class="absolute top-0 right-0 p-3 opacity-20">
                        <i data-lucide="database" class="w-12 h-12 text-blue-500"></i>
                    </div>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-6">Telemetría Crítica</h3>
                    
                    <div class="flex items-center justify-around py-4">
                        <div class="relative w-28 h-72 bg-slate-950 rounded-2xl border-4 border-slate-800 shadow-inner overflow-hidden">
                            <div id="waterFill" class="absolute bottom-0 w-full bg-blue-500 water-fill shadow-[0_-10px_20px_rgba(59,130,246,0.5)]">
                                <div class="absolute top-0 left-0 w-full h-1 bg-white/30 animate-pulse"></div>
                            </div>
                            <div class="absolute inset-0 flex flex-col justify-between p-2 text-[8px] font-bold text-slate-700 pointer-events-none">
                                <span>100%</span><span>75%</span><span>50%</span><span>25%</span><span>0%</span>
                            </div>
                        </div>

                        <div class="text-center">
                            <span class="text-[10px] font-bold text-blue-500 block mb-1">NIVEL ACTUAL</span>
                            <div class="flex items-baseline justify-center gap-1">
                                <h2 id="mainNivel" class="text-8xl font-black text-white tracking-tighter">--</h2>
                                <span class="text-xl font-bold text-slate-600">CM</span>
                            </div>
                            <div id="trendIndicator" class="mt-4 inline-flex items-center gap-1 px-3 py-1 rounded-full bg-slate-800 text-[10px] font-bold">
                                <i data-lucide="stable" class="w-3 h-3"></i> ESTABLE
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900/50 border border-slate-800 rounded-xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">SCADA / Configuración Hardware</h3>
                        <i data-lucide="settings-2" class="w-4 h-4 text-slate-600"></i>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] text-slate-500 block mb-1 uppercase font-bold">Límite Crítico (cm)</label>
                            <input type="number" id="inputCritico" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm text-blue-400 focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 block mb-1 uppercase font-bold">Fondo de Tanque (H m)</label>
                            <input type="number" step="0.01" id="inputH" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm text-blue-400 focus:border-blue-500 outline-none transition-all">
                        </div>
                        <button id="btnSaveConfig" class="w-full bg-blue-600/90 hover:bg-blue-600 text-white font-bold py-3 rounded text-[10px] uppercase tracking-widest transition-all flex items-center justify-center gap-2 border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Actualizar Hardware (OTA)
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-slate-900/50 border border-slate-800 rounded-xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-4">
                            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest text-blue-500">Análisis Histórico de Tendencia</h3>
                            <div class="h-4 w-[1px] bg-slate-800"></div>
                            <select id="histPeriod" class="bg-transparent text-[10px] font-bold text-slate-400 outline-none cursor-pointer hover:text-white uppercase">
                                <option value="1">Última Hora</option>
                                <option value="24">Últimas 24 Horas</option>
                            </select>
                        </div>
                        <select id="histMetric" class="bg-transparent text-[10px] font-bold text-slate-400 outline-none cursor-pointer hover:text-white uppercase">
                            <option value="nivel">Métrica: Nivel (cm)</option>
                        </select>
                    </div>
                    <div class="h-[400px] w-full">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // CONFIGURACIÓN CLAVE - CORREGIDA CON EL SECRET
        const FIREBASE_AUTH = "dnDjcywHxynS29VxdBLPDMo6nF5UC14QShKq4dmc";
        const FIREBASE_BASE = "https://hydrosentinel-b7ad6-default-rtdb.firebaseio.com/nodos/";
        let nodoActivo = "estacion_01";
        let mainChart;
        let syncInterval;

        // Sincronización Realtime - CORREGIDA
        async function sync() {
            try {
                const start = performance.now();
                // Consultamos el nodo 'actual' que configuramos en el ESP32
                const response = await fetch(`${FIREBASE_BASE}${nodoActivo}/actual.json?auth=${FIREBASE_AUTH}`);
                const data = await response.json();
                
                if (data) {
                    const nivel = data.nivel || 0;
                    document.getElementById('mainNivel').innerText = nivel;
                    
                    // Cálculo de porcentaje dinámico para el tanque visual
                    const fondo = parseFloat(document.getElementById('inputH').value * 100) || 130;
                    const porcentaje = Math.min((nivel / fondo) * 100, 100);
                    const fill = document.getElementById('waterFill');
                    fill.style.height = `${porcentaje}%`;

                    // Alerta visual de nivel crítico
                    const critico = parseFloat(document.getElementById('inputCritico').value) || 125;
                    if (nivel >= critico) {
                        fill.classList.replace('bg-blue-500', 'bg-red-600');
                        document.getElementById('mainNivel').classList.add('text-red-500', 'animate-pulse');
                    } else {
                        fill.classList.replace('bg-red-600', 'bg-blue-500');
                        document.getElementById('mainNivel').classList.remove('text-red-500', 'animate-pulse');
                    }
                }
                
                const end = performance.now();
                document.getElementById('statusTime').innerText = `ONLINE // ${(end - start).toFixed(2)}ms`;
            } catch (e) {
                console.error("Fallo de enlace NOC:", e);
                document.getElementById('statusTime').innerText = "ENLACE PERDIDO";
                document.getElementById('statusTime').classList.replace('text-emerald-400', 'text-red-500');
            }
        }

        // Cargar Configuración SCADA - CORREGIDA
        async function cargarConfiguracionNodo() {
            try {
                const response = await fetch(`${FIREBASE_BASE}${nodoActivo}/calibracion.json?auth=${FIREBASE_AUTH}`);
                const data = await response.json();
                if (data) {
                    document.getElementById('inputCritico').value = data.critico || 125;
                    document.getElementById('inputH').value = data.h || 1.30;
                }
            } catch (e) {
                console.log("Nodo nuevo o sin config.");
            }
        }

        // Guardar Configuración Hardware (OTA) - CORREGIDA
        document.getElementById('btnSaveConfig').addEventListener('click', async () => {
            const btn = document.getElementById('btnSaveConfig');
            const originalHtml = btn.innerHTML;
            
            try {
                const configJSON = JSON.stringify({
                    critico: parseInt(document.getElementById('inputCritico').value),
                    h: parseFloat(document.getElementById('inputH').value)
                });
                
                const response = await fetch(`${FIREBASE_BASE}${nodoActivo}/calibracion.json?auth=${FIREBASE_AUTH}`, {
                    method: 'PUT',
                    body: configJSON
                });

                if(response.ok) {
                    btn.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4"></i> Hardware Sincronizado';
                    btn.classList.replace('bg-blue-600/90', 'bg-emerald-600/90');
                    lucide.createIcons();
                    setTimeout(() => {
                        btn.innerHTML = originalHtml;
                        btn.classList.replace('bg-emerald-600/90', 'bg-blue-600/90');
                        lucide.createIcons();
                    }, 3000);
                }
            } catch (e) {
                console.error("Fallo SCADA: ", e);
            }
            sync();
        });

        // Configuración de Gráfica (Simplificada para rendimiento)
        const ctx = document.getElementById('mainChart').getContext('2d');
        mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{
                    label: 'Nivel del Agua (cm)',
                    data: Array(20).fill(0),
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: '#1e293b' } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // Loop de actualización
        cargarConfiguracionNodo().then(() => {
            sync(); // Primera carga
            syncInterval = setInterval(sync, 5000); // Sincroniza cada 5 segundos
        });
    </script>
</body>
</html>
